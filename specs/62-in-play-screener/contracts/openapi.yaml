openapi: 3.0.3
info:
  title: In-Play Volume Screener API
  version: 0.1.0
  description: >
    Serves the curated, RVOL-ranked, setup-aware in-play stock snapshot. Read endpoint is
    fast (latest cached snapshot); refresh happens out-of-band via the scheduler.
paths:
  /api/v1/screener/in-play:
    get:
      summary: Get the current in-play snapshot
      security: [{ bearerAuth: [] }]   # Pro+ tier required (FR-10)
      parameters:
        - { name: preset, in: query, schema: { type: string, enum: [momentum_long, pullback, breakout, short, any], default: any } }
        - { name: direction, in: query, schema: { type: string, enum: [long, short, any], default: any } }
        - { name: has_setup, in: query, schema: { type: boolean, default: false } }
        - { name: top_n, in: query, schema: { type: integer, minimum: 10, maximum: 100 } }
      responses:
        "200":
          description: Latest snapshot (filtered server-side by the params)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Snapshot" }
        "402": { description: Tier too low — locked teaser }
        "401": { description: Unauthenticated }
  /api/v1/screener/settings:
    get:
      summary: Get effective screener thresholds (global defaults + user overrides)
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Settings" } } } }
    put:
      summary: Update user-overridable thresholds (market_cap_floor, top_n)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SettingsUpdate" } } }
      responses:
        "200": { description: Updated, content: { application/json: { schema: { $ref: "#/components/schemas/Settings" } } } }
        "422": { description: Value out of bounds }
  /api/v1/screener/universe/rebuild:
    post:
      summary: Force a universe rebuild (admin only)
      security: [{ bearerAuth: [] }]
      responses:
        "202": { description: Rebuild started }
        "403": { description: Not an admin }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
  schemas:
    Snapshot:
      type: object
      properties:
        captured_at: { type: string, format: date-time }
        market_open: { type: boolean }
        stale: { type: boolean }
        top_n: { type: integer }
        entries: { type: array, items: { $ref: "#/components/schemas/Entry" } }
    Entry:
      type: object
      properties:
        rank: { type: integer }
        symbol: { type: string }
        last_price: { type: number }
        pct_change: { type: number }
        rvol: { type: number }
        dollar_vol: { type: number }
        market_cap: { type: number }
        sector: { type: string, nullable: true }
        direction: { type: string, enum: [long, short, neutral] }
        setup:
          type: object
          nullable: true
          properties:
            pattern: { type: string }
            entry: { type: number }
            stop: { type: number }
            target: { type: number }
            conviction: { type: string }
        refine:
          type: object
          properties:
            above_ema50: { type: boolean }
            above_vwap: { type: boolean }
            rsi: { type: number }
            rs_vs_spy: { type: number }
            atr_pct: { type: number }
    Settings:
      type: object
      properties:
        market_cap_floor: { type: number }
        price_floor: { type: number }
        dollar_vol_floor: { type: number }
        top_n: { type: integer }
        refresh_minutes: { type: integer }
        universe_rebuilt_at: { type: string, format: date-time, nullable: true }
    SettingsUpdate:
      type: object
      properties:
        market_cap_floor: { type: number, minimum: 50000000, maximum: 1000000000000 }
        top_n: { type: integer, minimum: 10, maximum: 100 }

          "acceptedAnswer": {

          "acceptedAnswer": {
            "@type": "Answer",

          }
        },
        {
          "@type": "Question",
          "name": "What is a WAIT signal?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "When AI scans your watchlist and finds no valid setup, it says WAIT. This is a feature, not a bug — it saves you from bad entries in choppy markets. No other platform tells you when NOT to trade."
          }
        },
        {
          "@type": "Question",
          "name": "What markets do you cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "US equities (SPY, AAPL, TSLA, NVDA, META, and more) during market hours, and crypto (ETH, BTC) 24/7 using Coinbase data for reliable pricing."
          }
        },
        {
          "@type": "Question",
          "name": "Can I try before paying?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The free tier is available forever (5 symbols, 3 AI queries per day). Every new account also gets 3 days of full Pro access to try all features."
          }
        }
      ]
